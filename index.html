<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Nuestra Historia</title>

<style>
body{
  background:black;
  color:white;
  font-family:Arial;
  text-align:center;
}

/* fotos de fondo */
.fotos{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  z-index:-1;
  overflow:hidden;
}

.fotos img{
  position:absolute;
  width:40%;
  opacity:0.25;
  animation:mover 30s infinite linear;
}

@keyframes mover{
  0%{transform:translateY(0px);}
  50%{transform:translateY(-40px);}
  100%{transform:translateY(0px);}
}
</style>

</head>

<body>

<h1>Te amo Carolina ❤️</h1>

<p>Desde el 12/05/2023</p>

<!-- AQUI VAN LAS FOTOS -->
