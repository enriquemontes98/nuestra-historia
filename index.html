<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nuestra Historia ❤️</title>

<style>

body{
margin:0;
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
background:linear-gradient(135deg,#ff6a88,#ff99ac,#ffc3a0);
height:100vh;
display:flex;
justify-content:center;
align-items:center;
color:white;
overflow:hidden;
}

/* CORAZONES */
#corazones{
position:fixed;
width:100%;
height:100%;
pointer-events:none;
z-index:0;
}

.corazonFloat{
position:absolute;
font-size:22px;
animation:flotar linear forwards;
}

@keyframes flotar{
from{transform:translateY(100vh) scale(.8);opacity:1;}
to{transform:translateY(-10vh) scale(1.3);opacity:0;}
}

.container{
width:340px;
background:rgba(255,255,255,0.18);
backdrop-filter:blur(15px);
padding:25px;
border-radius:25px;
text-align:center;
box-shadow:0 10px 40px rgba(0,0,0,.25);
z-index:1;
}

.display{
font-size:28px;
letter-spacing:3px;
background:rgba(255,255,255,0.25);
padding:15px;
border-radius:15px;
margin:15px 0;
}

.teclado{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:12px;
}

.btn{
background:rgba(255,255,255,0.3);
border:none;
padding:18px;
font-size:20px;
border-radius:15px;
color:white;
cursor:pointer;
transition:.2s;
}

.btn:hover{
transform:scale(1.08);
background:#ff4d6d;
}

.hidden{display:none;}

img{
width:100%;
border-radius:15px;
margin-top:15px;
opacity:1;
transition:opacity 1.5s ease;
}

.corazon{
font-size:35px;
animation:latido 1s infinite;
}

@keyframes latido{
50%{transform:scale(1.2);}
}

#contador{
font-size:24px;
margin-top:12px;
transition:.6s;
transform:scale(0);
opacity:0;
}

#contador.visible{
transform:scale(1);
opacity:1;
}

#mensaje{
min-height:60px;
margin-top:15px;
font-size:18px;
}

</style>
</head>

<body>

<div id="corazones"></div>

<!-- LOGIN -->
<div class="container" id="login">

<h2>❤️ Solo tú sabes la fecha ❤️</h2>
<p>Selecciona cuándo empezó nuestra historia</p>

<div class="display" id="pantalla">__/__/____</div>
<div class="teclado" id="teclado"></div>

</div>

<!-- APP -->
<div class="container hidden" id="app">

<div class="corazon">❤️</div>

<h3>Llevamos juntos:</h3>
<div id="contador"></div>

<img id="foto" src="img/foto1.jpg">
<div id="mensaje"></div>

</div>

<script>

/* ===== CONFIG ===== */

const fechaCorrecta="12/05/2023";
const fechaInicio=new Date(2023,4,12);

const fotos=[
"img/foto1.jpg",
"img/foto2.jpg",
"img/foto3.jpg",
"img/foto4.jpg",
"img/foto.jpg"
];

const mensajes=[
"Eres mi lugar favorito ❤️",
"TE AMO CAROLINA ❤️",
"Desde que llegaste todo tiene sentido.",
"Nuestro amor es mi mejor historia.",
"Siempre tú, siempre nosotros."
];

/* ===== TECLADO ===== */

const teclado=document.getElementById("teclado");
let entrada="";

["1","2","3","4","5","6","7","8","9","❤️","0","⌫"]
.forEach(num=>{
const b=document.createElement("button");
b.className="btn";
b.innerText=num;
b.onclick=()=>presionar(num);
teclado.appendChild(b);
});

function formatear(v){
if(v.length>2)v=v.slice(0,2)+"/"+v.slice(2);
if(v.length>5)v=v.slice(0,5)+"/"+v.slice(5);
return v;
}

function presionar(valor){

if(valor==="⌫") entrada=entrada.slice(0,-1);
else if(valor!=="❤️" && entrada.length<8) entrada+=valor;

pantalla.innerText=formatear(entrada)||"__/__/____";

if(formatear(entrada)===fechaCorrecta){
desbloquear();
}
}

/* ===== DESBLOQUEO ===== */

function desbloquear(){

login.classList.add("hidden");
app.classList.remove("hidden");

setTimeout(()=>contador.classList.add("visible"),300);

iniciarContador();
iniciarFotos();
iniciarMensajes();

setInterval(crearCorazon,350);
}

/* ===== CONTADOR ===== */

function iniciarContador(){

setInterval(()=>{

const ahora=new Date();

let años=ahora.getFullYear()-fechaInicio.getFullYear();
let meses=ahora.getMonth()-fechaInicio.getMonth();
let dias=ahora.getDate()-fechaInicio.getDate();
let horas=ahora.getHours()-fechaInicio.getHours();

if(horas<0){dias--;horas+=24;}

if(dias<0){
meses--;
dias+=new Date(ahora.getFullYear(),ahora.getMonth(),0).getDate();
}

if(meses<0){años--;meses+=12;}

const mesesTotales=años*12+meses;

contador.innerText=
`${mesesTotales} meses, ${dias} días y ${horas} horas ❤️`;

},1000);
}

/* ===== FOTOS (FADE CINEMÁTICO) ===== */

let f=0;
const foto=document.getElementById("foto");

function iniciarFotos(){

setInterval(()=>{

foto.style.opacity=0;

setTimeout(()=>{
f=(f+1)%fotos.length;
foto.src=fotos[f];
foto.style.opacity=1;
},800);

},6000);
}

/* ===== MENSAJES ===== */

let m=0;

function escribir(texto,i=0){
if(i<texto.length){
mensaje.innerHTML+=texto.charAt(i);
setTimeout(()=>escribir(texto,i+1),45);
}else{
setTimeout(()=>{
mensaje.innerHTML="";
m=(m+1)%mensajes.length;
escribir(mensajes[m]);
},2500);
}
}

function iniciarMensajes(){
escribir(mensajes[0]);
}

/* ===== CORAZONES ===== */

function crearCorazon(){
const c=document.createElement("div");
c.className="corazonFloat";
c.innerText="❤️";
c.style.left=Math.random()*100+"vw";
c.style.animationDuration=(3+Math.random()*3)+"s";
corazones.appendChild(c);
setTimeout(()=>c.remove(),6000);
}

</script>

</body>
</html>
